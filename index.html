<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>DBテスト</title>
</head>
<body>

<h1>単語帳</h1>

<!-- 入力 -->
<input type="text" id="word" placeholder="単語">
<input type="text" id="mean" placeholder="意味">
<button id="saveBtn">Save</button>
<button id="nextBtn">Next</button>

<!-- 一覧表示 -->
<div id="list"></div>

<script>
let db;

// DB初期化
const request = indexedDB.open("mydb", 1);

request.onupgradeneeded = function(e){
    db = e.target.result;
    if(!db.objectStoreNames.contains("m")){
        db.createObjectStore("m", { keyPath: "id", autoIncrement: true });
    }
};

request.onsuccess = function(e){
    db = e.target.result;
    load(); // ページ読み込み時に一覧表示
};

request.onerror = function(e){
    console.error("DBエラー", e.target.error);
};

// Save処理
document.getElementById("saveBtn").addEventListener("click", save);
function save(){
    const word = document.getElementById("word").value.trim();
    const mean = document.getElementById("mean").value.trim();
    if(!word || !mean){ alert("両方入力してください"); return; }

    const tx = db.transaction("m","readwrite");
    const store = tx.objectStore("m");
    store.add({word, mean});
    
    tx.oncomplete = function(){
        load(); // 保存後に一覧更新
        document.getElementById("word").value = "";
        document.getElementById("mean").value = "";
    };
    tx.onerror = function(e){ console.error("追加エラー", e.target.error); };
}

// 一覧表示
function load(){
    const tx = db.transaction("m","readonly");
    const store = tx.objectStore("m");
    store.getAll().onsuccess = function(e){
        const list = document.getElementById("list");
        list.innerHTML = "";
        e.target.result.forEach(item=>{
            const div = document.createElement("div");
            div.innerText = item.word + " - " + item.mean;
            list.appendChild(div);
        });
    };
}

// Nextボタンは仮で次の単語クリア
document.getElementById("nextBtn").addEventListener("click", ()=>{
    document.getElementById("word").value = "";
    document.getElementById("mean").value = "";
});
</script>

</body>
</html>
