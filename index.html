<!DOCTYPE html>
<html>
<body style="background:#111;color:#fff;text-align:center;padding-top:80px;">

<h2 id="word">Tap</h2>
<p id="mean"></p>

<button onclick="next()">Next</button>
<button onclick="save()">Save</button>

<p id="status">DB準備中...</p>

<script>
const data = [
  {w:"A", m:"a"},
  {w:"B", m:"b"}
];

let db = null;

// DB初期化
const request = indexedDB.open("LuminaSafe", 1);

request.onupgradeneeded = function(e){
  const db = e.target.result;
  db.createObjectStore("memory", {autoIncrement:true});
};

request.onsuccess = function(e){
  db = e.target.result;
  document.getElementById("status").innerText = "準備完了";
};

// 単語表示
function next(){
  const s = data[Math.floor(Math.random()*data.length)];
  document.getElementById("word").innerText = s.w;
  document.getElementById("mean").innerText = s.m;
}

// 保存（DB）
function save(){
  if(!db){
    alert("準備中です");
    return;
  }

  const word = document.getElementById("word").innerText;
  const mean = document.getElementById("mean").innerText;

  const tx = db.transaction("memory","readwrite");
  const store = tx.objectStore("memory");

  store.add({word, mean});

  alert("保存しました");
}
</script>

</body>
</html>
