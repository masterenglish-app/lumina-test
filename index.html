<!DOCTYPE html>
<html>
<body>

<h2 id="word">Tap</h2>
<p id="mean"></p>

<button onclick="next()">Next</button>
<button onclick="save()">Save</button>

<script>
let db;

const req = indexedDB.open("SAFE",1);

req.onupgradeneeded = e=>{
  e.target.result.createObjectStore("m",{keyPath:"word"});
};

req.onsuccess = e=>{
  db = e.target.result;
};

// 安全next
function next(){
  alert("next動いた"); // ←まず確認

  const d = [
    {w:"A",m:"a"},
    {w:"B",m:"b"}
  ];

  const s = d[Math.floor(Math.random()*d.length)];

  document.getElementById("word").innerText = s.w;
  document.getElementById("mean").innerText = s.m;
}

// save
function save(){
  alert("save動いた");
}
</script>

</body>
</html>
