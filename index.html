<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  font-family:sans-serif;
  background:#f9f9f9;
}

#word{
  font-size:42px;
  margin:10px;
}

#mean{
  font-size:18px;
  color:#666;
}

#hint{
  margin-top:15px;
  white-space:pre-line;
  color:#333;
}

textarea{
  margin-top:20px;
  width:80%;
  height:60px;
}

button{
  margin:5px;
  padding:10px;
}
</style>
</head>

<body>

<h2 id="word">Tap</h2>
<p id="mean"></p>
<p id="hint"></p>

<textarea id="story" placeholder="Write your story..."></textarea><br>

<button onclick="next()">Next</button>
<button onclick="save()">Save</button>
<button onclick="correct()">Correct</button>
<button onclick="incorrect()">Incorrect</button>
<button onclick="saveStory()">Story</button>

<script>
// =======================
// 🔐 API KEY（自分のキーに変更）
// =======================
const API_KEY = "AIzaSyDk3tkI8M9-tithyLWdnJZgFC6C-hC0Jis";

// =======================
// DB
// =======================
let db;

const req = indexedDB.open("MASTER",1);

req.onupgradeneeded = e=>{
  e.target.result.createObjectStore("m",{keyPath:"word"});
};

req.onsuccess = e=>{
  db = e.target.result;
};

// =======================
// 状態
// =======================
let lastStory = "";

// =======================
// AI
// =======================
async function askAI(text){
  try{
    const res = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+API_KEY,
      {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          contents:[{ parts:[{text:text}] }]
        })
      }
    );
    const data = await res.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
  }catch(e){
    return "";
  }
}

// =======================
// LUMINA
// =======================
async function lumina(mode){

  let base = document.getElementById("hint").innerText;

  let prompt = "";

  if(mode==="guidance"){
    prompt = `
Refine this into natural, short, calm English.
Do not explain.

${base}
`;
  }

  if(mode==="embrace"){
    prompt = `
Gently comfort. Do not teach.

${base}
`;
  }

  let reply = await askAI(prompt);

  if(reply){
    document.getElementById("hint").innerText = reply;
  }
}

// =======================
// Next（忘却＋時間）
// =======================
function next(){
  if(!db){ fallback(); return; }

  db.transaction("m").objectStore("m").getAll().onsuccess = e=>{
    let list = e.target.result;

    if(!list.length){
      fallback();
      return;
    }

    let now = Date.now();
    let pool = [];

    list.forEach(x=>{
      let weight =
        1 +
        (x.incorrect||0)*2 -
        (x.correct||0) +
        Math.floor((now-(x.last||0))/30000);

      weight = Math.max(1, weight);

      for(let i=0;i<weight;i++) pool.push(x);
    });

    let p = pool[Math.floor(Math.random()*pool.length)];

    document.getElementById("word").innerText = p.word;
    document.getElementById("mean").innerText = p.mean;

    document.getElementById("hint").innerText = "";
  };
}

// =======================
// fallback
// =======================
function fallback(){
  let d=[{w:"apple",m:"りんご"},{w:"book",m:"本"}];
  let s=d[Math.floor(Math.random()*d.length)];

  document.getElementById("word").innerText = s.w;
  document.getElementById("mean").innerText = s.m;
}

// =======================
// Save
// =======================
function save(){
  if(!db){ alert("準備中"); return; }

  let w = document.getElementById("word").innerText.toLowerCase();
  let m = document.getElementById("mean").innerText;

  let tx = db.transaction("m","readwrite");
  let s = tx.objectStore("m");

  s.get(w).onsuccess = e=>{
    let d = e.target.result || {
      word:w, mean:m, count:0, correct:0, incorrect:0, last:0
    };

    d.count++;
    d.last = Date.now();

    s.put(d);
  };
}

// =======================
// Answer
// =======================
function updateAnswer(isCorrect){
  if(!db) return;

  let w = document.getElementById("word").innerText.toLowerCase();

  let tx = db.transaction("m","readwrite");
  let s = tx.objectStore("m");

  s.get(w).onsuccess = e=>{
    let d = e.target.result;
    if(!d) return;

    if(isCorrect) d.correct++;
    else d.incorrect++;

    d.last = Date.now();

    s.put(d);
  };
}

// =======================
// Correct / Incorrect
// =======================
function correct(){
  updateAnswer(true);

  let base = generateFromStory();
  if(!base){
    let w = document.getElementById("word").innerText;
    base = "I use " + w + ".";
  }

  let q = base.replace(/^I /,"Do you ").replace(/\./,"?");

  document.getElementById("hint").innerText = base + "\n" + q;

  lumina("guidance");
}

function incorrect(){
  updateAnswer(false);

  let w = document.getElementById("word").innerText;

  document.getElementById("hint").innerText =
    "ゆっくり見直してみましょう: " + w;

  lumina("embrace");
}

// =======================
// Story
// =======================
function saveStory(){
  let text = document.getElementById("story").value;
  if(!text) return;

  lastStory = text;

  let clean = text.toLowerCase().replace(/[.,!?]/g,"");
  let words = clean.split(/\s+/);

  let tx = db.transaction("m","readwrite");
  let s = tx.objectStore("m");

  words.forEach(w=>{
    if(!w || w.length<2) return;

    s.get(w).onsuccess = e=>{
      let d = e.target.result || {
        word:w, mean:"(word)", count:0, correct:0, incorrect:0
      };
      d.count++;
      s.put(d);
    };
  });
}

// =======================
// 軽い補正
// =======================
function softCorrect(text){
  let s = text.trim().toLowerCase();
  s = s.replace(/\bi go school\b/g,"i go to school");

  s = s.charAt(0).toUpperCase()+s.slice(1);
  if(!s.endsWith(".")) s+=".";

  return s;
}

function generateFromStory(){
  if(!lastStory) return "";
  return softCorrect(lastStory);
}

</script>
</body>
</html>
