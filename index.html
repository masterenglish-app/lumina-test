<!DOCTYPE html>
<html>
<body>

<h2 id="word">Tap</h2>
<p id="mean"></p>
<p id="lumina"></p>

<textarea id="story" placeholder="一文、そっと置いてみてください"></textarea><br>
<button onclick="saveStory()">記録</button>

<br><br>

<button onclick="next()">Next</button>
<button onclick="save()">Save</button>
<button onclick="correct()">Correct</button>
<button onclick="incorrect()">Incorrect</button>

<br><br>

<button onclick="toggleLog()">静かな記録</button>
<div id="log" style="display:none;"></div>

<script>
let db;

// DB初期化
const req = indexedDB.open("FINAL",1);

req.onupgradeneeded = e=>{
  e.target.result.createObjectStore("m",{keyPath:"word"});
};

req.onsuccess = e=>{
  db = e.target.result;
};

// LUMINA
function lumina(mode){

  const messages = {
    guidance: [
      "少しずつ、形が見えてきています。",
      "その流れは、静かに続いています。"
    ],
    embrace: [
      "その歩み、静かに保たれています。",
      "今は、このままでも大丈夫です。"
    ],
    silence: [
      "一語だけ、そっと。",
      "ここに置いてみてください。"
    ]
  };

  const list = messages[mode] || messages.guidance;
  const msg = list[Math.floor(Math.random()*list.length)];

  document.getElementById("lumina").innerText = msg;
}

// 出題
function next(){
  if(!db){ fallback(); return; }

  db.transaction("m").objectStore("m").getAll().onsuccess = e=>{
    let list = e.target.result;

    if(!list.length){
      fallback();
      return;
    }

    let pool = [];

    list.forEach(x=>{
      let w = Math.max(1,5-(x.count||1));
      for(let i=0;i<w;i++) pool.push(x);
    });

    let p = pool[Math.floor(Math.random()*pool.length)];

    document.getElementById("word").innerText = p.word;
    document.getElementById("mean").innerText = p.mean;

    lumina("guidance");
  };
}

// 初期表示
function fallback(){
  let d=[{w:"A",m:"a"},{w:"B",m:"b"}];
  let s=d[Math.floor(Math.random()*d.length)];

  document.getElementById("word").innerText = s.w;
  document.getElementById("mean").innerText = s.m;

  lumina("silence");
}

// 保存
function save(){
  if(!db){ alert("準備中"); return; }

  let w = document.getElementById("word").innerText.toLowerCase();
  let m = document.getElementById("mean").innerText;

  let tx = db.transaction("m","readwrite");
  let s = tx.objectStore("m");

  s.get(w).onsuccess = e=>{
    let d = e.target.result || {word:w,mean:m,count:0,correct:0,incorrect:0};
    d.count++;
    s.put(d);
  };
}

// 正解
function correct(){
  updateAnswer(true);
  lumina("guidance");
}

// 不正解
function incorrect(){
  updateAnswer(false);
  lumina("embrace");
}

// 更新
function updateAnswer(isCorrect){
  if(!db){ return; }

  let w = document.getElementById("word").innerText.toLowerCase();

  let tx = db.transaction("m","readwrite");
  let s = tx.objectStore("m");

  s.get(w).onsuccess = e=>{
    let d = e.target.result;
    if(!d) return;

    if(isCorrect){
      d.correct = (d.correct||0)+1;
    }else{
      d.incorrect = (d.incorrect||0)+1;
    }

    s.put(d);
  };
}

// Story保存
function saveStory(){
  const text = document.getElementById("story").value;
  if(!text) return;

  let words = text.split(" ");

  let tx = db.transaction("m","readwrite");
  let s = tx.objectStore("m");

  words.forEach(w=>{
    if(!w) return;

    s.put({
      word:w.toLowerCase(),
      mean:"(from story)",
      count:1,
      correct:0,
      incorrect:0
    });
  });

  lumina("guidance");
}

// 記録表示
function toggleLog(){
  const log = document.getElementById("log");

  if(log.style.display === "none"){
    loadLog();
    log.style.display = "block";
    document.getElementById("lumina").innerText =
      "ここまでの足跡が、静かに残されています。";
  }else{
    log.style.display = "none";
  }
}

function loadLog(){
  if(!db) return;

  db.transaction("m").objectStore("m").getAll().onsuccess = e=>{
    const list = e.target.result;
    const log = document.getElementById("log");

    log.innerHTML = "";

    list.forEach(item=>{
      const div = document.createElement("div");
      div.innerText = item.word + " - " + item.mean;
      log.appendChild(div);
    });
  };
}
</script>

</body>
</html>
