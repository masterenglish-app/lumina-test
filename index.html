<!DOCTYPE html>
<html>
<body>

<h2 id="word">Tap</h2>
<p id="mean"></p>
<p id="hint"></p>

<textarea id="story" placeholder="Write your story..."></textarea><br>

<button onclick="next()">Next</button>
<button onclick="save()">Save</button>
<button onclick="correct()">Correct</button>
<button onclick="incorrect()">Incorrect</button>
<button onclick="saveStory()">Story Save</button>

<script>
// =======================
// 🔹 DB
// =======================
let db;

const req = indexedDB.open("MASTER",1);

req.onupgradeneeded = e=>{
  e.target.result.createObjectStore("m",{keyPath:"word"});
};

req.onsuccess = e=>{
  db = e.target.result;
};

// =======================
// 🔹 状態
// =======================
let lastStory = "";

// =======================
// 🔹 Next（忘却＋時間）
// =======================
function next(){
  if(!db){ fallback(); return; }

  db.transaction("m").objectStore("m").getAll().onsuccess = e=>{
    let list = e.target.result;

    if(!list.length){
      fallback();
      return;
    }

    let now = Date.now();
    let pool = [];

    list.forEach(x=>{
      let correct = x.correct || 0;
      let incorrect = x.incorrect || 0;
      let last = x.last || 0;

      let diff = (now - last) / 1000;

      let weight =
        1
        + incorrect * 2
        - correct
        + Math.floor(diff / 30);

      weight = Math.max(1, weight);

      for(let i=0;i<weight;i++){
        pool.push(x);
      }
    });

    let p = pool[Math.floor(Math.random()*pool.length)];

    document.getElementById("word").innerText = p.word;
    document.getElementById("mean").innerText = p.mean;

    showHint("", "");
    lumina("guidance");
  };
}

// =======================
// 🔹 fallback
// =======================
function fallback(){
  let d=[{w:"apple",m:"りんご"},{w:"book",m:"本"}];
  let s=d[Math.floor(Math.random()*d.length)];

  document.getElementById("word").innerText = s.w;
  document.getElementById("mean").innerText = s.m;
}

// =======================
// 🔹 Save
// =======================
function save(){
  if(!db){ alert("準備中"); return; }

  let w = document.getElementById("word").innerText.toLowerCase();
  let m = document.getElementById("mean").innerText;

  let tx = db.transaction("m","readwrite");
  let s = tx.objectStore("m");

  s.get(w).onsuccess = e=>{
    let d = e.target.result || {
      word:w,
      mean:m,
      count:0,
      correct:0,
      incorrect:0,
      last:0
    };

    d.count++;
    d.last = Date.now();

    s.put(d);
  };
}

// =======================
// 🔹 Answer更新
// =======================
function updateAnswer(isCorrect){
  if(!db) return;

  let w = document.getElementById("word").innerText.toLowerCase();

  let tx = db.transaction("m","readwrite");
  let s = tx.objectStore("m");

  s.get(w).onsuccess = e=>{
    let d = e.target.result;
    if(!d) return;

    if(isCorrect){
      d.correct = (d.correct||0)+1;
    }else{
      d.incorrect = (d.incorrect||0)+1;
    }

    d.last = Date.now();

    s.put(d);
  };
}

// =======================
// 🔹 Correct / Incorrect
// =======================
function correct(){
  updateAnswer(true);

  let base = generateFromStory();

  if(!base){
    let w = document.getElementById("word").innerText;
    base = generateSentence(w);
  }

  let q = generateQuestion(base);

  document.getElementById("hint").innerText =
    base + "\n" + q;

  lumina("guidance");
}

function incorrect(){
  updateAnswer(false);

  let w = document.getElementById("word").innerText;
  showHint("incorrect", w);

  lumina("embrace");
}

// =======================
// 🔹 Hint
// =======================
function showHint(type, word){
  const hint = document.getElementById("hint");

  if(type==="incorrect"){
    hint.innerText = "ゆっくり見直してみましょう： " + word;
  }else{
    hint.innerText = "";
  }
}

// =======================
// 🔹 Sentence生成
// =======================
function generateSentence(word){
  const t = [
    "I use " + word + ".",
    "I like " + word + ".",
    "I saw " + word + " today."
  ];
  return t[Math.floor(Math.random()*t.length)];
}

// =======================
// 🔹 質問生成
// =======================
function generateQuestion(sentence){
  return sentence
    .replace(/^I /,"Do you ")
    .replace(/\.$/,"?");
}

// =======================
// 🔹 Story保存
// =======================
function saveStory(){
  const text = document.getElementById("story").value;
  if(!text) return;

  lastStory = text;

  const clean = text.toLowerCase().replace(/[.,!?]/g,"");
  const words = clean.split(/\s+/);

  let tx = db.transaction("m","readwrite");
  let s = tx.objectStore("m");

  words.forEach(w=>{
    if(!w || w.length<2) return;

    s.get(w).onsuccess = e=>{
      let d = e.target.result || {
        word:w,
        mean:"(word)",
        count:0,
        correct:0,
        incorrect:0
      };
      d.count++;
      s.put(d);
    };
  });
}

// =======================
// 🔹 軽い補正
// =======================
function softCorrect(text){
  let s = text.trim().toLowerCase();

  s = s.replace(/\bi go school\b/g,"i go to school");

  s = s.charAt(0).toUpperCase()+s.slice(1);

  if(!s.endsWith(".")) s+=".";

  return s;
}

// =======================
// 🔹 Story生成
// =======================
function generateFromStory(){
  if(!lastStory) return "";
  return softCorrect(lastStory);
}

// =======================
// 🔹 LUMINA（簡易）
// =======================
function lumina(mode){
  const hint = document.getElementById("hint");

  if(mode==="guidance"){
    // 控えめ
  }
  if(mode==="embrace"){
    hint.innerText += "\n少しずつで大丈夫です。";
  }
}

</script>

</body>
</html>
