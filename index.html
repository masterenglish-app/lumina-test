<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
</head>
<body>

<h2 id="word">Tap</h2>
<p id="mean"></p>

<button onclick="next()">Next</button>
<button onclick="save()">Save</button>

<script>
let db;

const req = indexedDB.open("SAFE2",1);

req.onupgradeneeded = function(e){
  e.target.result.createObjectStore("m",{keyPath:"word"});
};

req.onsuccess = function(e){
  db = e.target.result;
};

function next(){
  const d = [
    {w:"A",m:"a"},
    {w:"B",m:"b"}
  ];
  const s = d[Math.floor(Math.random()*d.length)];

  document.getElementById("word").innerText = s.w;
  document.getElementById("mean").innerText = s.m;
}

function save(){
  if(!db){
    alert("wait");
    return;
  }

  const w = document.getElementById("word").innerText;
  const m = document.getElementById("mean").innerText;

  const tx = db.transaction("m","readwrite");
  const store = tx.objectStore("m");

  store.put({word:w,mean:m,count:1});
}
</script>

</body>
</html>
